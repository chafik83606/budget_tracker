workflows:
  ios-release:
    name: Budget Tracker iOS
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic-ios-release-v2

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ctre2.budgettracker

    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
      - name: Upload to App Store Connect
        script: |
          set -e
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found in build/ios/ipa"
            exit 1
          fi
          echo "Uploading $IPA_PATH to App Store Connect..."
          app-store-connect publish \
            --path "$IPA_PATH" \
            --altool-verbose-logging \
            --max-find-build-wait 0 \
            --max-build-processing-wait 0

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - direction@novasoft.solutions
        notify:
          success: true
          failure: true
