name: budget_tracker
description: "Application de suivi de depenses et budget - version gratuite et Pro."
publish_to: 'none'

version: 1.0.6+11

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Base de donnees locale
  sqflite: ^2.4.2
  path: ^1.9.1

  # Formatage dates et montants
  intl: ^0.20.2

  # Graphiques
  fl_chart: ^0.70.2

  # Preferences et statut Pro
  shared_preferences: ^2.5.3

  # Publicites (AdMob)
  google_mobile_ads: ^5.3.0

  # Achat in-app
  in_app_purchase: ^3.2.0

  # Export et partage
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  pdf: ^3.11.3
  csv: ^6.0.0

  # Selection fichier (restauration sauvegarde)
  file_picker: ^8.3.7

  # Chiffrement sauvegarde
  encrypt: ^5.0.3

  # Provider pour la gestion d etat
  provider: ^6.1.5

  # Verrouillage PIN / biométrie
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6

  # Widget écran d'accueil
  home_widget: ^0.7.0

  # OCR et scan de tickets
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2

  # Import PDF (rendu pages + OCR)
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: play_store_assets/ic_launcher_512.png
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: play_store_assets/ic_launcher_512.png

flutter:
  uses-material-design: true
